<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的应用</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 50px; }
    button { padding: 10px 20px; font-size: 18px; }
  </style>
</head>
<body>
  <h1>👋 欢迎使用我的应用</h1>
  <p id="message"></p>
  <button onclick="sayHello()">点我</button>

  <script>
    function sayHello() {
      document.getElementById('message').textContent = '你好，陌生人！';
    }
  </script>
</body>
</html>
