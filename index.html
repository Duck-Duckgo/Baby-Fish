<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>高能预警 · ENERGY OVERLOAD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --neon-pink: #ff2d95;
      --neon-cyan: #00f5ff;
      --neon-yellow: #fffc00;
      --bg-deep: #0a0514;
      --mx: 0.5;
      --my: 0.5;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: var(--bg-deep);
      color: #fff;
      font-family: "Noto Sans SC", "Space Grotesk", sans-serif;
      overflow-x: hidden;
    }

    /* 噪点层 */
    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      animation: noiseShift 0.3s steps(3) infinite;
    }

    @keyframes noiseShift {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(-2%, 2%); }
      66% { transform: translate(2%, -1%); }
    }

    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      isolation: isolate;
    }

    /* 放射背景 */
    .spotlight {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(
        circle 45vmin at calc(var(--mx) * 100%) calc(var(--my) * 100%),
        rgba(255, 45, 149, 0.18),
        rgba(0, 245, 255, 0.06) 35%,
        transparent 65%
      );
      mix-blend-mode: screen;
      transition: background 0.12s ease-out;
    }

    .burst-bg {
      position: absolute;
      inset: -50%;
      background:
        conic-gradient(from 0deg at 50% 50%,
          transparent 0deg,
          rgba(255, 45, 149, 0.15) 60deg,
          transparent 120deg,
          rgba(0, 245, 255, 0.12) 180deg,
          transparent 240deg,
          rgba(255, 252, 0, 0.1) 300deg,
          transparent 360deg);
      animation: spinBurst 20s linear infinite;
      z-index: 0;
    }

    @keyframes spinBurst {
      to { transform: rotate(360deg); }
    }

    .grid-floor {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 45vh;
      background:
        linear-gradient(to top, rgba(10, 5, 20, 0.95), transparent),
        repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(0, 245, 255, 0.06) 49px, rgba(0, 245, 255, 0.06) 50px),
        repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(255, 45, 149, 0.05) 49px, rgba(255, 45, 149, 0.05) 50px);
      transform: perspective(400px) rotateX(60deg);
      transform-origin: bottom center;
      mask-image: linear-gradient(to top, black 20%, transparent);
      z-index: 1;
      pointer-events: none;
    }

    .photo-wrap {
      position: relative;
      z-index: 2;
      width: min(92vw, 520px);
      aspect-ratio: 3 / 4;
      border-radius: 4px;
      transform-style: preserve-3d;
      animation: floaty 4s ease-in-out infinite;
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-12px) rotate(1deg); }
    }

    .photo-wrap::before {
      content: "";
      position: absolute;
      inset: -4px;
      background: linear-gradient(135deg, var(--neon-pink), var(--neon-cyan), var(--neon-yellow), var(--neon-pink));
      background-size: 300% 300%;
      border-radius: 8px;
      z-index: -1;
      animation: borderFlow 3s ease infinite;
      filter: blur(8px);
      opacity: 0.85;
    }

    @keyframes borderFlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .photo-inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 4px;
      overflow: hidden;
      box-shadow:
        0 0 60px rgba(255, 45, 149, 0.4),
        0 0 120px rgba(0, 245, 255, 0.25),
        inset 0 0 40px rgba(0, 0, 0, 0.3);
    }

    .photo-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      animation: glitchImg 4s steps(2) infinite;
    }

    @keyframes glitchImg {
      0%, 90%, 100% {
        filter: contrast(1.05) saturate(1.1);
        transform: translate(0);
      }
      92% {
        filter: contrast(1.2) saturate(1.3) hue-rotate(-8deg);
        transform: translate(-3px, 2px);
      }
      94% {
        filter: contrast(1.15) hue-rotate(8deg);
        transform: translate(4px, -2px);
      }
      96% {
        transform: translate(-2px, -1px);
      }
    }

    /* 色差层 */
    .chromatic {
      position: absolute;
      inset: 0;
      mix-blend-mode: screen;
      pointer-events: none;
      opacity: 0;
      animation: chroma 5s ease-in-out infinite;
    }

    .chromatic::before,
    .chromatic::after {
      content: "";
      position: absolute;
      inset: 0;
      background: inherit;
    }

    .chromatic::before {
      background: url("ec60276c3aa7c53f3fdf124569e4b8ef.jpg") center/cover;
      transform: translate(-3px, 0);
      opacity: 0.35;
      filter: hue-rotate(90deg);
      mix-blend-mode: multiply;
    }

    .chromatic::after {
      background: url("ec60276c3aa7c53f3fdf124569e4b8ef.jpg") center/cover;
      transform: translate(3px, 0);
      opacity: 0.35;
      filter: hue-rotate(-40deg);
      mix-blend-mode: lighten;
    }

    @keyframes chroma {
      0%, 85%, 100% { opacity: 0; }
      88%, 92% { opacity: 1; }
    }

    .scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.12) 2px,
        rgba(0, 0, 0, 0.12) 4px
      );
      mix-blend-mode: overlay;
      opacity: 0.4;
    }

    .title-block {
      position: relative;
      z-index: 3;
      text-align: center;
      margin-top: 2rem;
      max-width: 900px;
    }

    .eyebrow {
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--neon-cyan);
      text-shadow: 0 0 20px var(--neon-cyan);
      margin-bottom: 0.75rem;
      animation: blinkText 2s step-end infinite;
    }

    @keyframes blinkText {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.75; }
    }

    h1 {
      font-size: clamp(2.5rem, 10vw, 5rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--neon-yellow), #fff, var(--neon-pink), var(--neon-cyan));
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: titleShine 4s linear infinite;
      filter: drop-shadow(0 0 30px rgba(255, 45, 149, 0.6));
    }

    @keyframes titleShine {
      to { background-position: 200% center; }
    }

    .subtitle {
      margin-top: 1rem;
      font-size: clamp(1rem, 3.5vw, 1.35rem);
      font-weight: 700;
      color: rgba(255, 255, 255, 0.9);
      text-shadow:
        2px 0 var(--neon-pink),
        -2px 0 var(--neon-cyan);
      animation: glitchText 3s infinite;
    }

    @keyframes glitchText {
      0%, 94%, 100% {
        text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan);
        transform: translate(0);
      }
      95% {
        text-shadow: -3px 0 var(--neon-yellow), 3px 0 var(--neon-pink);
        transform: translate(-2px, 1px);
      }
      96% {
        text-shadow: 4px 0 var(--neon-cyan), -4px 0 var(--neon-yellow);
        transform: translate(3px, -1px);
      }
    }

    .cta-row {
      margin-top: 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      align-items: center;
    }

    .btn {
      display: inline-block;
      padding: 0.9rem 1.8rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-decoration: none;
      color: #0a0514;
      background: linear-gradient(135deg, var(--neon-yellow), #fff);
      border: none;
      border-radius: 2px;
      cursor: pointer;
      box-shadow:
        0 0 0 2px var(--neon-cyan),
        0 8px 0 #006b6b,
        0 12px 40px rgba(0, 245, 255, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-4px);
      box-shadow:
        0 0 0 2px var(--neon-pink),
        0 12px 0 #6b0044,
        0 16px 50px rgba(255, 45, 149, 0.45);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 0 0 2px var(--neon-cyan), 0 4px 0 #006b6b;
    }

    .badge {
      padding: 0.5rem 1rem;
      border: 1px solid var(--neon-pink);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--neon-pink);
      animation: pulseBorder 1.5s ease-in-out infinite;
    }

    @keyframes pulseBorder {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 45, 149, 0.5); }
      50% { box-shadow: 0 0 20px 4px rgba(255, 45, 149, 0.35); }
    }

    footer {
      position: relative;
      z-index: 4;
      padding: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>

  <section class="hero">
    <div class="burst-bg" aria-hidden="true"></div>
    <div class="spotlight" aria-hidden="true"></div>
    <div class="grid-floor" aria-hidden="true"></div>

    <div class="photo-wrap">
      <div class="photo-inner">
        <img
          src="ec60276c3aa7c53f3fdf124569e4b8ef.jpg"
          alt="高能自拍 — 笑容满格"
          width="520"
          height="693"
        />
        <div class="chromatic" aria-hidden="true"></div>
        <div class="scanlines" aria-hidden="true"></div>
      </div>
    </div>

    <div class="title-block">
      <p class="eyebrow">⚠ 视觉过载 · 请勿眨眼</p>
      <h1>表情管理<br />已离线</h1>
      <p class="subtitle">能量指数 ████████████ 爆表</p>
      <div class="cta-row">
        <a class="btn" href="#more">接收冲击波</a>
        <span class="badge">MEME MODE ON</span>
      </div>
    </div>
  </section>

  <footer id="more">
    静态炸裂页 · 照片与页面同目录即可 · 2026
  </footer>

  <script>
    (function () {
      var root = document.documentElement;
      function spark(e) {
        var x = e.clientX / window.innerWidth;
        var y = e.clientY / window.innerHeight;
        root.style.setProperty("--mx", x);
        root.style.setProperty("--my", y);
      }
      window.addEventListener("mousemove", spark, { passive: true });
    })();
  </script>
</body>
</html>
