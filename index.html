<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>坏KiKi的2026年黄历</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.7.7/lunar.js"></script>
  <style>
    :root {
      --ink: #2a1810;
      --paper: #f7f0e4;
      --paper2: #efe6d8;
      --cinnabar: #b42318;
      --cinnabar-dim: #8a1c15;
      --gold: #c9a227;
      --gold-dim: #9a7b1c;
      --green-yi: #1e6b3a;
      --red-ji: #9b1c1c;
      --muted: #6b5344;
      --shadow: rgba(42, 24, 16, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Source Han Serif SC", "Noto Serif SC", "Songti SC", "SimSun", serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(201, 162, 39, 0.08), transparent 55%),
        linear-gradient(180deg, #e8dcc8 0%, var(--paper) 35%, #f2e9da 100%);
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.25rem 1rem 2.5rem;
    }
    header {
      text-align: center;
      padding: 1.5rem 1rem 1.25rem;
      border-bottom: 3px double var(--gold);
      margin-bottom: 1.25rem;
      position: relative;
    }
    header::before,
    header::after {
      content: "◆";
      position: absolute;
      bottom: -0.55rem;
      color: var(--gold);
      font-size: 0.75rem;
    }
    header::before { left: 8%; }
    header::after { right: 8%; }
    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 4vw, 2.15rem);
      font-weight: 700;
      letter-spacing: 0.35em;
      color: var(--cinnabar);
      text-indent: 0.35em;
    }
    .subtitle {
      margin-top: 0.5rem;
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.12em;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .month-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .month-nav button {
      font-family: inherit;
      border: 1px solid rgba(180, 35, 24, 0.35);
      background: var(--paper2);
      color: var(--cinnabar-dim);
      padding: 0.35rem 0.55rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .month-nav button:hover {
      background: #fff;
      border-color: var(--cinnabar);
    }
    .month-nav button.active {
      background: var(--cinnabar);
      color: #fff;
      border-color: var(--cinnabar);
    }
    .nav-arrows {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .nav-arrows button {
      font-family: inherit;
      padding: 0.45rem 0.85rem;
      border-radius: 4px;
      border: 1px solid var(--gold-dim);
      background: linear-gradient(180deg, #fff8e7, #f0e4c8);
      color: var(--ink);
      cursor: pointer;
      font-size: 0.9rem;
    }
    .nav-arrows button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .nav-arrows .today {
      border-color: var(--cinnabar);
      color: var(--cinnabar);
      font-weight: 600;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
    }
    @media (min-width: 900px) {
      .layout {
        grid-template-columns: 1fr 340px;
        align-items: start;
      }
    }
    .cal-card,
    .detail-card {
      background: #fffef9;
      border: 1px solid rgba(201, 162, 39, 0.45);
      border-radius: 8px;
      box-shadow: 0 8px 24px var(--shadow);
    }
    .cal-head {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      padding: 0.5rem 0.35rem 0.35rem;
      border-bottom: 1px solid rgba(42, 24, 16, 0.08);
      background: linear-gradient(180deg, #faf6ee, #fffef9);
    }
    .cal-head span:first-child { color: var(--cinnabar); }
    .cal-head span:last-child { color: var(--cinnabar); }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      padding: 4px;
      background: rgba(42, 24, 16, 0.06);
    }
    .cell {
      min-height: 4.5rem;
      padding: 0.25rem 0.2rem;
      background: #fffef9;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: background 0.12s, outline 0.12s;
      border-radius: 2px;
    }
    .cell:hover { background: #fff7e6; }
    .cell.other { opacity: 0.22; pointer-events: none; }
    .cell.selected {
      outline: 2px solid var(--cinnabar);
      outline-offset: -2px;
      background: #fff4e0;
    }
    .cell.is-today .solar {
      background: var(--cinnabar);
      color: #fff;
      border-radius: 50%;
      width: 1.65rem;
      height: 1.65rem;
      line-height: 1.65rem;
      padding: 0;
    }
    .cell .solar {
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
    }
    .cell .lunar {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.15rem;
      line-height: 1.2;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cell .mark {
      font-size: 0.62rem;
      color: var(--cinnabar);
      margin-top: 0.1rem;
      line-height: 1.15;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .detail-card {
      padding: 1rem 1.1rem 1.25rem;
    }
    .detail-card h2 {
      margin: 0 0 0.75rem;
      font-size: 1.05rem;
      text-align: center;
      color: var(--cinnabar);
      letter-spacing: 0.08em;
      border-bottom: 1px solid rgba(201, 162, 39, 0.4);
      padding-bottom: 0.5rem;
    }
    .detail-grid {
      display: grid;
      gap: 0.55rem;
      font-size: 0.82rem;
      line-height: 1.55;
    }
    .row {
      display: grid;
      grid-template-columns: 4.5rem 1fr;
      gap: 0.35rem;
    }
    .row .label {
      color: var(--muted);
      flex-shrink: 0;
    }
    .row .val { word-break: break-all; }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
    }
    .tag {
      display: inline-block;
      padding: 0.12rem 0.35rem;
      border-radius: 3px;
      font-size: 0.72rem;
      border: 1px solid transparent;
    }
    .tag.yi {
      background: rgba(30, 107, 58, 0.1);
      color: var(--green-yi);
      border-color: rgba(30, 107, 58, 0.25);
    }
    .tag.ji {
      background: rgba(155, 28, 28, 0.08);
      color: var(--red-ji);
      border-color: rgba(155, 28, 28, 0.22);
    }
    .block-yi,
    .block-ji {
      margin-top: 0.35rem;
    }
    .block-yi .title,
    .block-ji .title {
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .block-yi .title { color: var(--green-yi); }
    .block-ji .title { color: var(--red-ji); }
    footer {
      margin-top: 1.75rem;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.6;
    }
    footer a { color: var(--gold-dim); }
    .load-hint {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>二〇二六年黄历</h1>
      <p class="subtitle" id="yearGanZhi">加载中…</p>
    </header>

    <div id="app">
      <p class="load-hint">正在加载历法库…</p>
    </div>

    <footer>
      历法与宜忌数据由开源库 <a href="https://github.com/6tail/lunar-javascript" target="_blank" rel="noopener">lunar-javascript</a> 推算，仅供民俗文化与日程参考，不作任何决策依据。
    </footer>
  </div>

  <script>
    (function () {
      var YEAR = 2026;

      function daysInMonth(y, m) {
        return new Date(y, m, 0).getDate();
      }

      function initialSelection() {
        var now = new Date();
        if (now.getFullYear() === YEAR) {
          return { month: now.getMonth() + 1, day: now.getDate() };
        }
        return { month: 1, day: 1 };
      }

      function joinList(arr) {
        if (!arr || !arr.length) return "—";
        return arr.join("　");
      }

      function tagList(arr, cls) {
        if (!arr || !arr.length) return '<span class="val">—</span>';
        return (
          '<span class="tags">' +
          arr
            .map(function (t) {
              return '<span class="tag ' + cls + '">' + t + "</span>";
            })
            .join("") +
          "</span>"
        );
      }

      function renderApp() {
        if (typeof Solar === "undefined") {
          document.getElementById("app").innerHTML =
            '<p class="load-hint">历法库加载失败，请检查网络后刷新页面。</p>';
          return;
        }

        var sel = initialSelection();
        var state = { month: sel.month, day: sel.day };

        var app = document.getElementById("app");

        function refreshYearSubtitle() {
          var dim0 = daysInMonth(YEAR, state.month);
          var d0 = Math.min(state.day, dim0);
          var lu = Solar.fromYmd(YEAR, state.month, d0).getLunar();
          document.getElementById("yearGanZhi").textContent =
            "当前农历年柱：" +
            lu.getYearInGanZhi() +
            "（" +
            lu.getYearShengXiao() +
            "）· 公历 " +
            YEAR +
            " 年";
        }

        function buildMonthButtons() {
          var html = '<div class="month-nav">';
          for (var m = 1; m <= 12; m++) {
            html +=
              '<button type="button" data-m="' +
              m +
              '"' +
              (m === state.month ? ' class="active"' : "") +
              ">" +
              m +
              "月</button>";
          }
          html += "</div>";
          return html;
        }

        function renderToolbar() {
          return (
            '<div class="toolbar">' +
            buildMonthButtons() +
            '<div class="nav-arrows">' +
            '<button type="button" id="prevM">上月</button>' +
            '<button type="button" id="nextM">下月</button>' +
            '<button type="button" class="today" id="goToday">今日</button>' +
            "</div></div>"
          );
        }

        function cellMarks(solar, lunar) {
          var parts = [];
          var jq = lunar.getJieQi();
          if (jq) parts.push(jq);
          var fs = solar.getFestivals().concat(solar.getOtherFestivals());
          var lf = lunar.getFestivals().concat(lunar.getOtherFestivals());
          fs.forEach(function (x) {
            if (parts.indexOf(x) < 0) parts.push(x);
          });
          lf.forEach(function (x) {
            if (parts.indexOf(x) < 0) parts.push(x);
          });
          return parts.slice(0, 2);
        }

        function lunarDayLine(lunar) {
          var lm = lunar.getMonthInChinese() + "月";
          if (lunar.getDay() === 1) return lm + "初一";
          return lunar.getDayInChinese();
        }

        function renderCalendar() {
          var dim = daysInMonth(YEAR, state.month);
          if (state.day > dim) state.day = dim;

          var first = new Date(YEAR, state.month - 1, 1);
          var monday0 = (first.getDay() + 6) % 7;
          var totalCells = Math.ceil((monday0 + dim) / 7) * 7;

          var grid = '<div class="cal-card"><div class="cal-head">';
          var wk = ["一", "二", "三", "四", "五", "六", "日"];
          for (var i = 0; i < 7; i++) grid += "<span>周" + wk[i] + "</span>";
          grid += '</div><div class="cal-grid">';

          var now = new Date();
          var isRealToday =
            now.getFullYear() === YEAR && now.getMonth() + 1 === state.month;

          for (var c = 0; c < totalCells; c++) {
            var dayNum = c - monday0 + 1;
            if (dayNum < 1 || dayNum > dim) {
              grid += '<div class="cell other"></div>';
              continue;
            }
            var solar = Solar.fromYmd(YEAR, state.month, dayNum);
            var lunar = solar.getLunar();
            var marks = cellMarks(solar, lunar);
            var markHtml = marks.length
              ? '<div class="mark">' + marks.join(" ") + "</div>"
              : "";

            var selected = dayNum === state.day ? " selected" : "";
            var todayCls =
              isRealToday && dayNum === now.getDate() ? " is-today" : "";

            grid +=
              '<div class="cell' +
              selected +
              todayCls +
              '" data-day="' +
              dayNum +
              '">' +
              '<span class="solar">' +
              dayNum +
              "</span>" +
              '<span class="lunar">' +
              lunarDayLine(lunar) +
              "</span>" +
              markHtml +
              "</div>";
          }
          grid += "</div></div>";
          return grid;
        }

        function detailHtml() {
          var dim = daysInMonth(YEAR, state.month);
          var d = Math.min(state.day, dim);
          var solar = Solar.fromYmd(YEAR, state.month, d);
          var lunar = solar.getLunar();

          var yi = lunar.getDayYi();
          var ji = lunar.getDayJi();

          var title =
            YEAR +
            "年" +
            state.month +
            "月" +
            d +
            "日　" +
            solar.getWeekInChinese();

          var rows = [
            ["农历", lunar.getYearInChinese() + lunar.getMonthInChinese() + "月" + lunar.getDayInChinese()],
            ["干支", "年" + lunar.getYearInGanZhi() + "　月" + lunar.getMonthInGanZhi() + "　日" + lunar.getDayInGanZhi()],
            ["生肖", lunar.getYearShengXiao() + "年"],
            ["纳音", lunar.getDayNaYin()],
            ["节气", lunar.getJieQi() || "—"],
            ["星座", solar.getXingZuo()],
            ["值神", lunar.getDayTianShen() + "（" + lunar.getDayTianShenLuck() + "）"],
            ["十二神", lunar.getZhiXing()],
            ["星宿", lunar.getXiu() + lunar.getZheng() + lunar.getAnimal() + "（" + lunar.getXiuLuck() + "）"],
            ["彭祖百忌", lunar.getPengZuGan() + "　" + lunar.getPengZuZhi()],
            ["冲煞", lunar.getChongDesc() + "　煞" + lunar.getDaySha()],
            ["胎神", lunar.getDayPositionTai()],
            ["吉神宜趋", joinList(lunar.getDayJiShen())],
            ["凶煞宜忌", joinList(lunar.getDayXiongSha())]
          ];

          var body = rows
            .map(function (r) {
              return (
                '<div class="row"><span class="label">' +
                r[0] +
                '</span><span class="val">' +
                r[1] +
                "</span></div>"
              );
            })
            .join("");

          return (
            '<div class="detail-card"><h2>' +
            title +
            "</h2>" +
            '<div class="detail-grid">' +
            body +
            '<div class="block-yi"><div class="title">宜</div>' +
            tagList(yi, "yi") +
            "</div>" +
            '<div class="block-ji"><div class="title">忌</div>' +
            tagList(ji, "ji") +
            "</div></div></div>"
          );
        }

        function paint() {
          refreshYearSubtitle();
          app.innerHTML =
            '<div class="layout">' +
            "<div>" +
            renderToolbar() +
            renderCalendar() +
            "</div>" +
            detailHtml() +
            "</div>";

          app.querySelectorAll(".month-nav button").forEach(function (btn) {
            btn.addEventListener("click", function () {
              state.month = parseInt(btn.getAttribute("data-m"), 10);
              paint();
            });
          });

          app.querySelectorAll(".cal-grid .cell").forEach(function (cell) {
            cell.addEventListener("click", function () {
              state.day = parseInt(cell.getAttribute("data-day"), 10);
              paint();
            });
          });

          var prev = app.querySelector("#prevM");
          var next = app.querySelector("#nextM");
          var goT = app.querySelector("#goToday");

          prev.addEventListener("click", function () {
            if (state.month <= 1) return;
            state.month--;
            paint();
          });
          next.addEventListener("click", function () {
            if (state.month >= 12) return;
            state.month++;
            paint();
          });
          prev.disabled = state.month <= 1;
          next.disabled = state.month >= 12;

          goT.addEventListener("click", function () {
            var n = new Date();
            if (n.getFullYear() === YEAR) {
              state.month = n.getMonth() + 1;
              state.day = n.getDate();
            } else {
              state.month = n.getMonth() + 1;
              state.day = Math.min(n.getDate(), daysInMonth(YEAR, n.getMonth() + 1));
            }
            paint();
          });
        }

        paint();
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", renderApp);
      } else {
        renderApp();
      }
    })();
  </script>
</body>
</html>
